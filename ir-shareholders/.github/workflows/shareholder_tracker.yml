name: Shareholder Tracker

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no notifications, no state save)"
        type: boolean
        default: false
  push:
    branches: [main]

jobs:
  scan:
    name: Scan Shareholders
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright if needed
        run: |
          if grep -q "fetch_type: js" companies.yml; then
            pip install playwright
            playwright install chromium --with-deps
          fi

      - name: Run scan
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          NOTIFY_EMAIL_PASS: ${{ secrets.NOTIFY_EMAIL_PASS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run --output-json changes.json
          else
            python main.py --output-json changes.json
          fi

      - name: Show summary
        run: python summarize.py

      - name: Commit updated state
        run: |
          git config user.name "shareholder-tracker[bot]"
          git config user.email "shareholder-tracker[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "No state changes"
          else
            git commit -m "chore: update shareholder state [skip ci]"
            git push
          fi
